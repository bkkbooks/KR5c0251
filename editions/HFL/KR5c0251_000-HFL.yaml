front:
  text: 太上三皇寳齋神仙上録經
  hash: sha256:a77c56d65b85a6bfd214050ee0a440b9e0eeb96422e9683fd2890f178a7c1347
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0251_HFL_000-001a, image: hfl/0575/0575-020.png}
body:
  text: 三皇神仙内神寳祝齋録門黄帝曰凡學士精心願樂勤道求生苦齋大寂希求神仙朝夕求靈不避飢寒救護萬姓以爲因縁福流七世免度大患身超水火形安體全洞極上法令兆神仙學以成之道德日新黄帝曰三皇神者胎靈之神也皇上之祕篇也兆有之者神仙見之者延年詠之者上見皇君十方諸天皆來試觀焉其文至妙其位至尊能令人出入水火變化幽冥司録三官一時定生精勤之哉必書仙名其術至真非惟經篇黄帝曰兆有此書勤心齋戒燒香祝文沐浴雲水燔烟上元結齋三九八帝神篇叩心祝誦上聞三天七世罪除冥考都蠲過度苦道削罪成真勤而修之上見皇君矣黄帝曰先天有三皇之神八帝次其治皆髙真爲輔邪惡不生災害不作非世所傳伏羲女媧之時也其治各一萬三千𡻕後上天爲八帝尊皇所受靈書妙術長生久化之道輔聖七録治世三竒此其書也又以青素書三皇文三尺爲幡以朱書之以一丈竹竿懸於庭中亦可以几請皇文以北向爲坐燒香願呪叩齒二十四通竟祝曰香煙玉女上白皇君小兆甲乙清齋絶塵期靈五通上願成真滅禍生福上昇三天畢然燈行道祝願皆如此法也諸是災難禍害无不盡消疾病垂命皆得更生又此齋法侍燈勤苦當日中一食至夜生氣時燒香陳願畢又一食此則毎時食息也但不得冒履殗濁令不精專之人千犯齋禁也行事節度一如上法合上元香珠法用沉香三斤薫陸一斤青木九兩雞舌五兩玄參三兩雀頭六兩詹香三兩白芷二兩真檀四兩艾香三兩安息膠四兩木蘭三兩凡一十二種別擣絹篩之畢納乾棗十兩更擣三萬杵納白器中宻盖蒸香一日畢更蜜和擣之丸如梧桐子以青繩穿之日曝令乾此三皇真元之香珠也燒此皆徹九天真人玉女皆歌此於空玄之中又加雄黄半斤麝香四兩合擣和爲丸服如大豆大十九日一服耳常能服之今人神明不衰口生香氣又感真徹靈降致玉女并萬病諸疰惡鬼不祥妖魔皆自逺伏也黄帝曰皇文齋法至真至貴非世所傳夫求長生及爲萬兆請福救解厄難除災却害當先行八帝大齋之法以解七世父母及已身除罪三年之後乃得刻定仙名以致不死之道也若欲劾召百神皆須積齋成功感應自然乃可召之其時意中皆自了於心中也黄帝曰若萬兆有疾病急厄及罪積深大不可得救者皆當告請三皇以爲寳齋之法以拔贖之也當燒香然燈各三枚或五枚或七枚或九枚或可三十六枚以象三十六天之數也如此四十日或百日罪名皆除於是司命司録以結定仙名爲兆得無量大福明燈以照神燔煙以嚮氣太真神樂三皇燕集兆得神仙慶流萬世一年之中得三七行事爲大度也黄帝曰若爲萬民致福救其急難厄禍兆當清齋三日若五日七日九日適意耳當沐浴玄雲之水燒皇上之香然玄液之燭三燈五燈七燈九燈意適耳相去間六尺不得令燭行大闊一香罏一油燈不得使人從燈間中過欲聽過立纂門又常守燈今香煙不絶至日中日入又再拜燒香祝乞適所陳耳此名三五大齋内禮之法也作香玄腴法用麻腴一斛真檀一斤青木香一斤玄參一兩香珠三兩擣碎納腴中宻盖之微火煎之半日成也作雲水之法用水三斛青木香四兩真檀七兩玄參二兩合治煮之令得一沸畢清澄適寒温以自沐浴也此天真玉女玄水之法名錬胎神漿此法及香珠皆出於寳齋上録篇中非世人之所見也兆若欲知機通感知人罪福者皆應服三皇幽天符即自通感神明逆見將來之玄㑹也醮儀候夜行道竟敷席設座依三皇位天皇北皂爲座地皇西南白爲座人皇東北碧爲座三大長盤三甌酒昆布爲脯南粽果随時珍酒三斗省肉脯初向北呪曰香煙玉女上白皇君某奉爲某清齋行道十八時竟正爾燒香獻禮拜請三皇真君願降以靈元下入某身所啓逕御三皇几前次酌酒三拜跪曰洞神弟子某謹爲某奉請天皇監太一君地皇主真一君人皇統三一君願並降席鍳察丹心次思神良久跪曰小兆某上白三皇真君某以凡庸謬叨正法昔奉受三皇寳文内以自修外以教世今有某投詞披請謹重宣聞謮詞謹承詞㫖率同法如千人奉爲修建三皇齋直三日三夜一十八時行道竭誠首請事已周竟謹投蔬醪薄獻蘋藻仰願聖皇特垂慈盻赦宥某深愆重咎解釋𡨚對削落黒簡延益祚暦療治衆疾永蒙康𥙿克隆萬福勤行德惠家國兼泰率土元吉謹以奏言請賜矜𠃔再三拜又隨意陳乞言曰上降尊靈逺臨鄙濁祈禮既畢不敢稽留呼吸上昇還神反位稽首奉辭次再拜燒香復罏曰香煙三女真靈臨降垂慈布澤上昇天宫香煙飛散與道和合次畢作禮而退太上三皇寳齋神仙上録經終
